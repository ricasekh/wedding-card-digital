<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <!-- Embossed chinar damask: each motif drawn twice, light copy up-left,
       dark copy down-right, reading as relief pressed into the paper -->
  <defs>
    <path id="leaf" d="M0 -50 L8 -28 L26 -36 L20 -14 L42 -18 L30 0 L48 8 L28 14 L34 34 L12 26 L6 44 L2 44 L2 58 L-2 58 L-2 44 L-6 44 L-12 26 L-34 34 L-28 14 L-48 8 L-30 0 L-42 -18 L-20 -14 L-26 -36 L-8 -28 Z"/>
  </defs>
  <g fill="none" stroke-width="5" stroke-linejoin="round">
    <g transform="translate(45,45) scale(0.30)">
      <use href="#leaf" stroke="#fffdf5" stroke-opacity="0.55" transform="translate(-2.5,-2.5)"/>
      <use href="#leaf" stroke="#6f5322" stroke-opacity="0.28" transform="translate(2.5,2.5)"/>
    </g>
    <g transform="translate(135,135) scale(0.30) rotate(180)">
      <use href="#leaf" stroke="#fffdf5" stroke-opacity="0.55" transform="translate(-2.5,-2.5)"/>
      <use href="#leaf" stroke="#6f5322" stroke-opacity="0.28" transform="translate(2.5,2.5)"/>
    </g>
    <g transform="translate(135,45) scale(0.13) rotate(45)">
      <use href="#leaf" stroke="#fffdf5" stroke-opacity="0.4" transform="translate(-4,-4)"/>
      <use href="#leaf" stroke="#6f5322" stroke-opacity="0.2" transform="translate(4,4)"/>
    </g>
    <g transform="translate(45,135) scale(0.13) rotate(-45)">
      <use href="#leaf" stroke="#fffdf5" stroke-opacity="0.4" transform="translate(-4,-4)"/>
      <use href="#leaf" stroke="#6f5322" stroke-opacity="0.2" transform="translate(4,4)"/>
    </g>
  </g>
</svg>
